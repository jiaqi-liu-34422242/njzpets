name: build-mac

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  mac:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - arm64
          - x64
    env:
      # Opt-in early so JS-based actions don't run on deprecated Node 20.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build mac artifacts (dmg + zip)
        run: npm run dist:mac -- --${{ matrix.arch }} --publish never

      - name: Normalize artifact names
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.arch }}" = "x64" ]; then
            mv "dist/NewJeans Pets-1.0.0.dmg" "dist/NewJeans Pets-1.0.0-x64.dmg"
            mv "dist/NewJeans Pets-1.0.0-mac.zip" "dist/NewJeans Pets-1.0.0-x64-mac.zip"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NewJeans-Pets-mac-${{ matrix.arch }}
          path: |
            dist/*-${{ matrix.arch }}.dmg
            dist/*-${{ matrix.arch }}-mac.zip
