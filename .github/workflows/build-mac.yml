name: build-mac

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  mac:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build mac artifacts (dmg + zip)
        run: npm run dist:mac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NewJeans-Pets-mac
          path: |
            dist/*.dmg
            dist/*.zip

