<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NewJeans Pets</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="pet-stage" aria-label="Pet stage">
        <div class="pet-room" id="petRoom">
          <div class="bubble" id="bubbleText">Hello</div>
          <div class="pet-cluster" id="petCluster">
            <button class="pet-button" id="petButton" type="button" aria-label="Interact with pet">
              <span class="pet" id="petSprite" aria-hidden="true">
                <canvas class="pet-canvas" id="petCanvas" width="384" height="416"></canvas>
              </span>
            </button>
            <div class="pet-nameplate" id="petTitle">Minji</div>
          </div>
        </div>

        <div class="action-bar" aria-label="Pet actions">
          <button class="shell-button" id="idleButton" type="button" title="Idle" aria-label="Idle">😊</button>
          <button class="shell-button" id="talkButton" type="button" title="Next Bubble" aria-label="Next Bubble">💬</button>
          <button class="shell-button" id="switchPetButton" type="button" title="切换下一只桌宠" aria-label="切换下一只桌宠">⇄</button>
          <button class="shell-button" id="showAllPetsButton" type="button" title="多宠物并存" aria-label="多宠物并存">👥</button>
          <button class="shell-button shell-button-danger" id="closePetButton" type="button" title="Close This Pet" aria-label="Close This Pet">🐾</button>
          <button class="shell-button" id="scaleButton" type="button" title="Scale Pet" aria-label="Scale Pet">🔍</button>
          <button class="shell-button" id="editBubbleButton" type="button" title="Edit Bubble Text" aria-label="Edit Bubble Text">✏️</button>
          <button class="shell-button" id="bubbleToggleButton" type="button" title="显示/隐藏气泡" aria-label="显示/隐藏气泡">🗨️</button>
          <button class="shell-button" id="companionButton" type="button" title="Companion Mode" aria-label="Companion Mode">♡</button>
          <button class="shell-button" id="pinButton" type="button" title="Always On Top" aria-label="Always On Top">📌</button>
          <button class="shell-button" id="hideButton" type="button" title="Hide All To Tray" aria-label="Hide All To Tray">🙈</button>
          <button class="shell-button shell-button-danger" id="quitButton" type="button" title="Quit App" aria-label="Quit App">✕</button>
          <button class="action-button" data-action="running-right" type="button">Right</button>
          <button class="action-button" data-action="running-left" type="button">Left</button>
          <button class="action-button" data-action="waving" type="button">Wave</button>
          <button class="action-button" data-action="jumping" type="button">Jump</button>
          <button class="action-button" data-action="failed" type="button">Fail</button>
          <button class="action-button" data-action="waiting" type="button">Wait</button>
          <button class="action-button" data-action="running" type="button">Busy</button>
          <button class="action-button" data-action="review" type="button">Review</button>
        </div>
      </section>
    </main>

    <div class="bubble-editor-modal" id="bubbleEditorModal" aria-hidden="true">
      <div class="bubble-editor-backdrop" id="bubbleEditorBackdrop"></div>
      <section class="bubble-editor-dialog" aria-label="Edit Bubble Text">
        <div class="bubble-editor-header">
          <h2>Bubble Text</h2>
        </div>
        <div class="bubble-manager">
          <div class="bubble-line-list" id="bubbleLineList" role="listbox" tabindex="0" aria-label="Bubble text lines"></div>
          <div class="bubble-line-actions">
            <button class="editor-button" id="addBubbleLineButton" type="button">New</button>
            <button class="editor-button" id="editBubbleLineButton" type="button">Edit</button>
            <button class="editor-button" id="deleteBubbleLineButton" type="button">Delete</button>
          </div>
        </div>
        <div class="bubble-line-form" id="bubbleLineForm" hidden>
          <label for="bubbleLineInput">Line text</label>
          <input id="bubbleLineInput" type="text" maxlength="80" placeholder="输入一句台词">
          <div class="bubble-line-form-actions">
            <button class="editor-button" id="confirmBubbleLineButton" type="button">OK</button>
            <button class="editor-button" id="cancelBubbleLineButton" type="button">Cancel</button>
          </div>
        </div>
        <div class="bubble-editor-actions bubble-editor-footer">
          <button class="editor-button" id="saveBubbleButton" type="button">Save</button>
          <button class="editor-button" id="resetBubbleButton" type="button">Restore Default</button>
          <button class="editor-button" id="cancelBubbleEditorButton" type="button">Cancel</button>
        </div>
      </section>
    </div>

    <script src="./pet-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
